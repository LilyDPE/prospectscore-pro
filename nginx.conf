# ProspectScore Pro - Configuration Nginx optimisée
# À déployer dans /etc/nginx/sites-available/prospectscore-pro

upstream prospectscore_backend {
    server localhost:8003;
    keepalive 32;
}

upstream prospectscore_frontend {
    server localhost:3003;
    keepalive 32;
}

server {
    listen 80;
    server_name score.2a-immobilier.com;

    # Taille max des uploads
    client_max_body_size 50M;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Logs
    access_log /var/log/nginx/prospectscore_access.log;
    error_log /var/log/nginx/prospectscore_error.log;

    # Backend API - routes /api/*
    location /api/ {
        proxy_pass http://prospectscore_backend/api/;
        proxy_http_version 1.1;

        # Headers WebSocket + HTTP
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Headers client
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Keepalive
        proxy_set_header Connection "";
    }

    # Documentation API
    location /docs {
        proxy_pass http://prospectscore_backend/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenAPI JSON
    location /openapi.json {
        proxy_pass http://prospectscore_backend/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Frontend - toutes les autres routes
    location / {
        proxy_pass http://prospectscore_frontend/;
        proxy_http_version 1.1;

        # Headers WebSocket + HTTP
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Headers client
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

# Configuration HTTPS (à activer après certbot)
server {
    listen 443 ssl http2;
    server_name score.2a-immobilier.com;

    # Certificats SSL (à configurer avec certbot)
    ssl_certificate /etc/letsencrypt/live/score.2a-immobilier.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/score.2a-immobilier.com/privkey.pem;

    # Configuration SSL moderne
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Taille max des uploads
    client_max_body_size 50M;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Logs
    access_log /var/log/nginx/prospectscore_ssl_access.log;
    error_log /var/log/nginx/prospectscore_ssl_error.log;

    # Backend API - routes /api/*
    location /api/ {
        proxy_pass http://prospectscore_backend/api/;
        proxy_http_version 1.1;

        # Headers WebSocket + HTTP
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Headers client
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Keepalive
        proxy_set_header Connection "";
    }

    # Documentation API
    location /docs {
        proxy_pass http://prospectscore_backend/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenAPI JSON
    location /openapi.json {
        proxy_pass http://prospectscore_backend/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Frontend - toutes les autres routes
    location / {
        proxy_pass http://prospectscore_frontend/;
        proxy_http_version 1.1;

        # Headers WebSocket + HTTP
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Headers client
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
